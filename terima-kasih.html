<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terima Kasih — GeoMETriA</title>
  <style>
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 22px;
      color: #1f2937;
      background: radial-gradient(circle at top left, #e8f7f5, transparent 32rem), #f2f6fa;
      font-family: "Segoe UI", Arial, sans-serif;
    }
    .card {
      width: min(100%, 680px);
      padding: 44px 30px;
      text-align: center;
      background: #fff;
      border: 1px solid #d8e0e8;
      border-radius: 24px;
      box-shadow: 0 18px 46px rgba(18, 58, 99, 0.14);
    }
    .icon {
      width: 78px;
      height: 78px;
      margin: 0 auto 20px;
      display: grid;
      place-items: center;
      color: #fff;
      background: linear-gradient(135deg, #147d78, #1967a3);
      border-radius: 50%;
      font-size: 2.2rem;
      font-weight: 900;
      box-shadow: 0 10px 22px rgba(20, 125, 120, 0.24);
    }
    h1 {
      margin: 0;
      color: #123a63;
      font-size: clamp(2rem, 5vw, 3rem);
    }
    p {
      margin: 14px auto 0;
      max-width: 520px;
      color: #5f6b7a;
      font-size: 1.05rem;
      line-height: 1.65;
    }
    .brand {
      margin-top: 24px;
      color: #1967a3;
      font-weight: 800;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="icon" aria-hidden="true">✓</div>
    <h1>Terima Kasih</h1>
    <p>Respons cikgu telah berjaya dihantar. Terima kasih atas masa, penyertaan dan maklum balas yang diberikan untuk penambahbaikan GeoMETriA.</p>
    <div class="brand">GeoMETriA</div>
  </main>
</body>
</html>
